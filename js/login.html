<body>

         </div>
        <Script>
            let b=document.getElementById("btn")
            let p=document.getElementById("para")
            b.addEventListener("click",()=>{
                 p.innerHTML="login sucessfully !!!"
                 color()

            })
            function color(){
                para.style.color="green"
            
            }

        </Script>

    </div>
